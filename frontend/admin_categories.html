<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categories | Querra</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">Q</div><div>Querra</div></div>
        <nav class="nav">
          <a href="/admin_dashboard"><i class="fa fa-gauge-high"></i> Dashboard</a>
          <a href="/manage_complaints"><i class="fa fa-clipboard-list"></i> Manage Complaints</a>
          <a href="/admin_users"><i class="fa fa-users"></i> Users</a>
          <a href="/admin_departments"><i class="fa fa-building"></i> Departments</a>
          <a class="active" href="/admin_categories"><i class="fa fa-tags"></i> Categories</a>
          
          <a href="#" class="logout-link" id="logoutLink"><i class="fa fa-right-from-bracket"></i> Logout</a>
        </nav>
        <div class="footer">Admin Panel <span class="small muted">v2.0</span></div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div><h1><i class="fa fa-tags" style="color:var(--accent);margin-right:8px;"></i>Categories</h1></div>
        </div>

        <section class="panel" style="margin-bottom:20px;">
          <h3 class="section-heading">Add New Category</h3>
          <form id="addCatForm" style="display:flex;gap:12px;align-items:flex-end;max-width:800px;">
             <div class="form-field" style="flex:1;">
               <label>Name</label>
               <input type="text" name="category_name" required>
             </div>
             <div class="form-field" style="flex:1;">
               <label>Department</label>
               <select name="dept_id" id="deptSelect" required></select>
             </div>
             <button class="btn btn-primary" type="submit">Add</button>
          </form>
        </section>

        <section class="panel">
          <div id="catTable" class="table-wrapper">
            <div style="text-align:center;padding:40px 0;"><div class="loader" style="margin:0 auto 12px;"></div></div>
          </div>
        </section>
      </main>
    </div>
    <script>
      let deptMap = {};

      
        

      async function init() {
        const dRes = await fetch('/api/admin/departments');
        const dJson = await dRes.json();
        if(dJson.success) {
           document.getElementById('deptSelect').innerHTML = dJson.departments.map(d => `<option value="${d.dept_id}">${d.dept_name}</option>`).join('');
           dJson.departments.forEach(d => deptMap[d.dept_id] = d.dept_name);
        }
        fetchCats();
      }

      async function fetchCats() {
        const res = await fetch('/api/admin/categories');
        const json = await res.json();
        if(json.success) {
           const rows = json.categories.map(c => `<tr>
             <td>${c.category_id}</td>
             <td><strong>${c.category_name}</strong></td>
             <td><span class="badge" style="background:var(--glass-strong);">${deptMap[c.dept_id] || c.dept_id}</span></td>
             <td style="text-align:right;">
               <button class="btn btn-sm btn-outline" style="color:#ef4444;border-color:rgba(239,68,68,0.3);" onclick="deleteCat(${c.category_id})" title="Delete Category"><i class="fa fa-trash"></i></button>
             </td>
           </tr>`).join('');
           document.getElementById('catTable').innerHTML = `<table>
             <thead><tr><th>ID</th><th>Category Name</th><th>Department</th><th style="text-align:right;">Actions</th></tr></thead>
             <tbody>${rows}</tbody>
           </table>`;
        }
      }

      async function deleteCat(id) {
        if(!confirm('Are you sure you want to delete this category? All associated complaints will be removed.')) return;
        const res = await fetch(`/api/admin/categories/${id}`, { method: 'DELETE' });
        const json = await res.json();
        if(json.success) {
          fetchCats();
        } else {
          alert(json.error || 'Failed to delete category');
        }
      }

      document.getElementById('addCatForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = Object.fromEntries(new FormData(e.target).entries());
        await fetch('/api/admin/categories', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        e.target.reset();
        fetchCats();
      });

      init();
    </script>
  
<div id="logoutModalOverlay" class="logout-modal-overlay">
  <div class="logout-modal">
    <h3 style="margin-bottom:12px;"><i class="fa fa-right-from-bracket" style="color:var(--accent);"></i> Logout</h3>
    <p style="margin-bottom:24px;" class="muted">Are you sure you want to logout?</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-outline" onclick="document.getElementById('logoutModalOverlay').classList.remove('active')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
<script>
  if(document.getElementById('logoutLink')) {
    document.getElementById('logoutLink').replaceWith(document.getElementById('logoutLink').cloneNode(true));
    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('logoutModalOverlay').classList.add('active');
    });
  }
  async function confirmLogout() {
    await fetch('/api/auth/logout', {method:'POST'});
    window.location.href = '/login';
  }
</script>
</body>
</html>
