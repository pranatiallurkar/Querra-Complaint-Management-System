<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile | Querra</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">Q</div><div>Querra</div></div>
        <nav class="nav">
          <a href="/user_dashboard"><i class="fa fa-gauge-high"></i> Dashboard</a>
          <a href="/add_complaint"><i class="fa fa-plus-circle"></i> Add Complaint</a>
          <a href="/my_complaints"><i class="fa fa-folder-open"></i> My Complaints</a>
          <a href="/track_complaint"><i class="fa fa-magnifying-glass-location"></i> Track Complaint</a>
          <a class="active" href="/profile"><i class="fa fa-user-circle"></i> Profile</a>
          <a href="#" class="logout-link" id="logoutLink"><i class="fa fa-right-from-bracket"></i> Logout</a>
        </nav>
        <div class="footer">User Portal <span class="small muted">v2.0</span></div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div><h1><i class="fa fa-user-circle" style="color:var(--accent);margin-right:8px;"></i>My Profile</h1></div>
        </div>

        <section class="panel" style="max-width: 600px; margin: 0 auto;">
          <div class="section-heading">Account Information</div>
          <p class="muted" style="margin-bottom:20px;">Update your personal details and password.</p>
          
          <div id="profileAlert"></div>
          
          <form id="profileForm" class="form-grid">
            <div class="form-field full-width">
              <label>Full Name</label>
              <input type="text" id="pName" name="name" required />
            </div>
            
            <div class="form-field full-width">
              <label>Email Address</label>
              <input type="email" id="pEmail" name="email" required />
            </div>
            
            <div class="form-field full-width">
              <label>New Password (Optional)</label>
              <input type="password" id="pPassword" name="password" placeholder="Leave blank to keep current password" />
            </div>
            
            <div style="grid-column:1/3;display:flex;gap:12px;margin-top:10px;">
              <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> Save Changes</button>
            </div>
          </form>
        </section>

        <div class="footer-bar">© 2026 Querra — Complaint Management System</div>
      </main>
    </div>

    <script>
      const alertEl = document.getElementById('profileAlert');
      const showAlert = (message, type='success') => {
        alertEl.innerHTML = `<div class="alert ${type==='error'?'error':'success'}" style="margin-bottom:20px;">${message}</div>`;
        setTimeout(()=>alertEl.innerHTML='', 5000);
      };

      
        

      async function loadProfile() {
         const res = await fetch('/api/user/profile');
         const json = await res.json();
         if(json.success) {
            document.getElementById('pName').value = json.profile.name;
            document.getElementById('pEmail').value = json.profile.email;
         } else {
            showAlert('Failed to load profile', 'error');
         }
      }

      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = Object.fromEntries(new FormData(e.target).entries());
        if(!payload.password) delete payload.password; // Don't send empty password

        showAlert('Saving...', 'success');
        try {
           const res = await fetch('/api/user/profile', {
             method: 'PUT',
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify(payload)
           });
           const json = await res.json();
           if(json.success) {
              showAlert('<i class="fa fa-check-circle"></i> Profile updated successfully!', 'success');
              document.getElementById('pPassword').value = ''; // clear password
           } else {
              showAlert(json.error, 'error');
           }
        } catch(err) {
           showAlert('Failed to update profile.', 'error');
        }
      });

      loadProfile();
    </script>
  
<div id="logoutModalOverlay" class="logout-modal-overlay">
  <div class="logout-modal">
    <h3 style="margin-bottom:12px;"><i class="fa fa-right-from-bracket" style="color:var(--accent);"></i> Logout</h3>
    <p style="margin-bottom:24px;" class="muted">Are you sure you want to logout?</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-outline" onclick="document.getElementById('logoutModalOverlay').classList.remove('active')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
<script>
  if(document.getElementById('logoutLink')) {
    document.getElementById('logoutLink').replaceWith(document.getElementById('logoutLink').cloneNode(true));
    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('logoutModalOverlay').classList.add('active');
    });
  }
  async function confirmLogout() {
    await fetch('/api/auth/logout', {method:'POST'});
    window.location.href = '/login';
  }
</script>
</body>
</html>
