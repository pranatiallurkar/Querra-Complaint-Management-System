<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Complaints | Querra</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">Q</div><div>Querra</div></div>
        <nav class="nav">
          <a href="/user_dashboard"><i class="fa fa-gauge-high"></i> Dashboard</a>
          <a href="/add_complaint"><i class="fa fa-plus-circle"></i> Add Complaint</a>
          <a class="active" href="/my_complaints"><i class="fa fa-folder-open"></i> My Complaints</a>
          <a href="/track_complaint"><i class="fa fa-magnifying-glass-location"></i> Track Complaint</a>
          <a href="/profile"><i class="fa fa-user-circle"></i> Profile</a>
          <a href="#" class="logout-link" id="logoutLink"><i class="fa fa-right-from-bracket"></i> Logout</a>
        </nav>
        <div class="footer">User Portal <span class="small muted">v2.0</span></div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div><h1><i class="fa fa-folder-open" style="color:var(--accent);margin-right:8px;"></i>My Complaints</h1></div>
          <div class="actions">
            <a class="btn btn-outline btn-sm" href="/user_dashboard"><i class="fa fa-arrow-left"></i> Dashboard</a>
          </div>
        </div>

        <section class="panel">
          <div class="filters">
            <input id="q" class="select" placeholder="Search my complaints..." style="min-width:220px;" />
            <select id="statusFilter" class="select"><option value="">All Statuses</option></select>
            <select id="priorityFilter" class="select">
              <option value="">All Priorities</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
            <button id="applyBtn" class="btn btn-primary btn-sm"><i class="fa fa-filter"></i> Apply Filters</button>
          </div>
          <div id="complaintTable" class="table-wrapper">
            <div style="text-align:center;padding:40px 0;"><div class="loader" style="margin:0 auto 12px;"></div><span class="muted">Loading complaints...</span></div>
          </div>
        </section>

        <div class="footer-bar">© 2026 Querra — Complaint Management System</div>
      </main>
    </div>

    <script>

      async function loadStatus(){
        try {
          const res = await fetch('/api/status');
          const json = await res.json();
          if(json.success){
            document.getElementById('statusFilter').innerHTML = ['<option value="">All Statuses</option>'].concat(json.status.map(s=>`<option value="${s.status_id}">${s.status_name}</option>`)).join('');
          }
        } catch(e) {}
      }

      async function fetchComplaints(){
        const q = document.getElementById('q').value.trim();
        const status = document.getElementById('statusFilter').value;
        const priority = document.getElementById('priorityFilter').value;
        
        const params = new URLSearchParams(); 
        if(q) params.set('q',q); 
        if(status) params.set('status',status); 
        if(priority) params.set('priority',priority);
        
        try {
          const res = await fetch('/api/complaints?'+params.toString());
          const json = await res.json();
          if(!json.success){ document.getElementById('complaintTable').innerHTML='<div class="muted text-center" style="padding:30px;">Unable to load complaints.</div>'; return; }
          
          if(!json.complaints.length){ 
            document.getElementById('complaintTable').innerHTML='<div class="muted text-center" style="padding:40px;"><i class="fa fa-inbox" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No complaints found.</div>'; 
            return; 
          }
          
          const rows = json.complaints.map(c => {
            const statusClass = c.status_name.toLowerCase() === 'resolved' ? 'resolved' :
                                c.status_name.toLowerCase() === 'open' ? 'open' : 'progress';
            return `<tr>
              <td><span class="small muted">#${c.complaint_id}</span></td>
              <td><strong>${c.title}</strong></td>
              <td>${c.dept_name || '—'}</td>
              <td>${c.category_name || '—'}</td>
              <td><span class="badge badge-${c.priority.toLowerCase()}">${c.priority}</span></td>
              <td><span class="badge badge-${statusClass}">${c.status_name}</span></td>
              <td class="small muted">${new Date(c.created_at).toLocaleDateString()}</td>
            </tr>`;
          }).join('');
          
          document.getElementById('complaintTable').innerHTML = `<table>
            <thead><tr><th>ID</th><th>Title</th><th>Dept</th><th>Category</th><th>Priority</th><th>Status</th><th>Created</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
        } catch(e) {
          document.getElementById('complaintTable').innerHTML='<div class="muted text-center" style="padding:30px;">Error connecting to server.</div>';
        }
      }

      document.getElementById('applyBtn').addEventListener('click', fetchComplaints);
      document.getElementById('q').addEventListener('keyup', e => { if(e.key === 'Enter') fetchComplaints(); });

      loadStatus(); 
      fetchComplaints();
    </script>
  
<div id="logoutModalOverlay" class="logout-modal-overlay">
  <div class="logout-modal">
    <h3 style="margin-bottom:12px;"><i class="fa fa-right-from-bracket" style="color:var(--accent);"></i> Logout</h3>
    <p style="margin-bottom:24px;" class="muted">Are you sure you want to logout?</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-outline" onclick="document.getElementById('logoutModalOverlay').classList.remove('active')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
<script>
  if(document.getElementById('logoutLink')) {
    document.getElementById('logoutLink').replaceWith(document.getElementById('logoutLink').cloneNode(true));
    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('logoutModalOverlay').classList.add('active');
    });
  }
  async function confirmLogout() {
    await fetch('/api/auth/logout', {method:'POST'});
    window.location.href = '/login';
  }
</script>
</body>
</html>
