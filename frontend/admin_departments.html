<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Departments | Querra</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">Q</div><div>Querra</div></div>
        <nav class="nav">
          <a href="/admin_dashboard"><i class="fa fa-gauge-high"></i> Dashboard</a>
          <a href="/manage_complaints"><i class="fa fa-clipboard-list"></i> Manage Complaints</a>
          <a href="/admin_users"><i class="fa fa-users"></i> Users</a>
          <a class="active" href="/admin_departments"><i class="fa fa-building"></i> Departments</a>
          <a href="/admin_categories"><i class="fa fa-tags"></i> Categories</a>
          
          <a href="#" class="logout-link" id="logoutLink"><i class="fa fa-right-from-bracket"></i> Logout</a>
        </nav>
        <div class="footer">Admin Panel <span class="small muted">v2.0</span></div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div><h1><i class="fa fa-building" style="color:var(--accent);margin-right:8px;"></i>Departments</h1></div>
        </div>

        <section class="panel" style="margin-bottom:20px;">
          <h3 class="section-heading">Add New Department</h3>
          <form id="addDeptForm" style="display:flex;gap:12px;align-items:flex-end;max-width:800px;">
             <div class="form-field" style="flex:1;">
               <label>Name</label>
               <input type="text" name="dept_name" required>
             </div>
             <div class="form-field" style="flex:2;">
               <label>Description</label>
               <input type="text" name="description" required>
             </div>
             <button class="btn btn-primary" type="submit">Add</button>
          </form>
        </section>

        <section class="panel">
          <div id="deptTable" class="table-wrapper">
            <div style="text-align:center;padding:40px 0;"><div class="loader" style="margin:0 auto 12px;"></div></div>
          </div>
        </section>
      </main>
    </div>
    <script>

      async function fetchDepts() {
        const res = await fetch('/api/admin/departments');
        const json = await res.json();
        if(json.success) {
           const rows = json.departments.map(d => `<tr>
             <td>${d.dept_id}</td>
             <td><strong>${d.dept_name}</strong></td>
             <td class="muted">${d.description}</td>
             <td style="text-align:right;">
               <button class="btn btn-sm btn-outline" style="color:#ef4444;border-color:rgba(239,68,68,0.3);" onclick="deleteDept(${d.dept_id})" title="Delete Department"><i class="fa fa-trash"></i></button>
             </td>
           </tr>`).join('');
           document.getElementById('deptTable').innerHTML = `<table>
             <thead><tr><th>ID</th><th>Name</th><th>Description</th><th style="text-align:right;">Actions</th></tr></thead>
             <tbody>${rows}</tbody>
           </table>`;
        }
      }

      async function deleteDept(id) {
        if(!confirm('Are you sure you want to delete this department? All associated categories and complaints will be removed.')) return;
        const res = await fetch(`/api/admin/departments/${id}`, { method: 'DELETE' });
        const json = await res.json();
        if(json.success) {
          fetchDepts();
        } else {
          alert(json.error || 'Failed to delete department');
        }
      }

      document.getElementById('addDeptForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = Object.fromEntries(new FormData(e.target).entries());
        await fetch('/api/admin/departments', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        e.target.reset();
        fetchDepts();
      });

      fetchDepts();
    </script>
  
<div id="logoutModalOverlay" class="logout-modal-overlay">
  <div class="logout-modal">
    <h3 style="margin-bottom:12px;"><i class="fa fa-right-from-bracket" style="color:var(--accent);"></i> Logout</h3>
    <p style="margin-bottom:24px;" class="muted">Are you sure you want to logout?</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-outline" onclick="document.getElementById('logoutModalOverlay').classList.remove('active')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
<script>
  if(document.getElementById('logoutLink')) {
    document.getElementById('logoutLink').replaceWith(document.getElementById('logoutLink').cloneNode(true));
    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('logoutModalOverlay').classList.add('active');
    });
  }
  async function confirmLogout() {
    await fetch('/api/auth/logout', {method:'POST'});
    window.location.href = '/login';
  }
</script>
</body>
</html>
